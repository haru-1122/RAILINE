<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='css/login.css') }}">
    <title>新規登録</title>
</head>
<body><div class="ticket">
        
        <header><h1>RAILINE</h1></header>
        <h2>新規登録</h2>
        
        {% if data %}
            <p style="color: red;">{{ data }}</p>
        {% endif %}
        
        <form action="{{ url_for('register') }}" method="post">
            <table>
                <tr><th>名前</th><td><input type="text" name="name" required></td></tr>
                <tr><th>ユーザー名</th><td><input type="text" name="username" required></td></tr>
                <tr><th>メールアドレス</th><td><input type="email" name="mail" required></td></tr>
                <tr><th>パスワード</th><td><input type="password" name="password" required></td></tr>
            </table>
            <input type="submit" value="保存" class="button">
        </form>
        <a href="{{ url_for('home') }}" class="button">戻る</a>

    </div>
</body>
</html>
